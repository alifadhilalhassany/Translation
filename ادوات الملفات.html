<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أدوات الملفات (بدون إنترنت)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Client-Side PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0fdf4; /* Light green tint for offline vibe */ background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .tool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tool-card:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        /* Range slider styling */
        input[type=range] { accent-color: #2563eb; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- App Header -->
    <header class="bg-brand-600 text-white shadow-lg z-20 relative">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <button id="btn-back" class="hidden text-white hover:bg-brand-500 rounded-full w-10 h-10 flex items-center justify-center transition-colors">
                <i class="fas fa-arrow-right text-xl"></i>
            </button>
            <div class="flex-1 flex justify-center items-center gap-2">
                <i class="fas fa-bolt text-yellow-300 text-xl"></i>
                <h1 class="text-xl font-bold" id="app-title">أدوات أوفلاين</h1>
            </div>
            <div class="w-10"></div> <!-- Spacer -->
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative p-4 pb-20">
        
        <!-- View 1: Dashboard -->
        <div id="view-home" class="container mx-auto max-w-md block">
            <div class="bg-blue-50 border border-blue-200 text-blue-800 rounded-xl p-3 mb-6 text-sm flex items-start gap-3 shadow-sm">
                <i class="fas fa-shield-alt text-xl mt-0.5"></i>
                <p>جميع هذه الأدوات تعمل بالكامل داخل جهازك. لا يتم رفع أي ملفات إلى الإنترنت، مما يضمن <strong>الخصوصية التامة والسرعة.</strong></p>
            </div>
            
            <div class="grid grid-cols-2 gap-4" id="tools-grid">
                <!-- Dynamic Tools injected here -->
            </div>
        </div>

        <!-- View 2: Tool Interface -->
        <div id="view-tool" class="container mx-auto max-w-md hidden h-full flex-col fade-in">
            <div class="glass-card rounded-3xl shadow-xl border border-white/50 p-6 flex-1 flex flex-col">
                
                <!-- Tool Header -->
                <div class="text-center mb-6">
                    <div id="tool-icon-box" class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner">
                        <i id="tool-icon" class="fas fa-file"></i>
                    </div>
                    <h2 id="tool-name" class="text-2xl font-bold text-gray-800"></h2>
                    <p id="tool-desc" class="text-gray-500 text-sm mt-1"></p>
                </div>

                <!-- Upload Area -->
                <div class="flex-1 flex flex-col">
                    <input type="file" id="file-input" class="hidden" />
                    <label for="file-input" id="drop-zone" class="border-2 border-dashed border-brand-300 rounded-2xl bg-brand-50/50 hover:bg-brand-50 transition-colors flex flex-col items-center justify-center py-12 cursor-pointer text-brand-600 relative overflow-hidden group">
                        <i class="fas fa-cloud-upload-alt text-5xl mb-4 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-lg" id="upload-text">اضغط هنا لاختيار الملفات</span>
                        <span class="text-sm text-brand-400 mt-2" id="upload-hint"></span>
                    </label>

                    <!-- Selected Files & Dynamic Options -->
                    <div id="action-area" class="mt-4 flex-1 flex flex-col hidden fade-in">
                        
                        <!-- Files List -->
                        <div id="files-list" class="space-y-2 mb-4 max-h-32 overflow-y-auto pr-1">
                            <!-- Files injected here -->
                        </div>

                        <!-- Dynamic Tool Options (Sliders, Selects, etc.) -->
                        <div id="tool-options" class="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-4 hidden">
                            <!-- Options injected here -->
                        </div>

                        <div class="mt-auto">
                            <!-- Progress -->
                            <div id="progress-container" class="hidden mb-4">
                                <div class="flex justify-between text-xs font-bold text-brand-600 mb-1">
                                    <span id="progress-text">جاري المعالجة...</span>
                                    <span id="progress-percent">0%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                                    <div id="progress-bar" class="bg-brand-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <button id="btn-action" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-brand-700 active:transform active:scale-95 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-magic"></i>
                                <span id="btn-action-text">تنفيذ</span>
                            </button>
                            
                            <button id="btn-download" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-600 mt-3 hidden flex items-center justify-center gap-2 transition-all fade-in">
                                <i class="fas fa-download text-xl"></i>
                                <span>حفظ النتيجة</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-bold transition-all duration-300 opacity-0 pointer-events-none z-50 flex items-center gap-2 translate-y-[-20px]">
        <i class="fas fa-info-circle"></i>
        <span id="toast-msg">رسالة</span>
    </div>

    <script>
        // --- 1. TOOL DEFINITIONS ---
        // These are 100% client-side achievable tasks.
        const toolsConfig = [
            {
                id: 'img2pdf',
                title: 'صور إلى PDF',
                desc: 'دمج عدة صور في ملف PDF واحد.',
                icon: 'fa-images',
                color: 'text-indigo-600',
                bg: 'bg-indigo-100',
                accept: 'image/jpeg, image/png, image/webp',
                multiple: true,
                hint: 'اختر صورة أو أكثر',
                btnText: 'إنشاء ملف PDF',
                handler: runImageToPdf
            },
            {
                id: 'mergePdf',
                title: 'دمج PDF',
                desc: 'دمج عدة ملفات PDF في ملف واحد.',
                icon: 'fa-object-group',
                color: 'text-rose-600',
                bg: 'bg-rose-100',
                accept: 'application/pdf',
                multiple: true,
                hint: 'اختر ملفين PDF أو أكثر',
                btnText: 'دمج الملفات',
                handler: runMergePdf
            },
            {
                id: 'splitPdf',
                title: 'استخراج صفحة',
                desc: 'استخراج صفحة معينة من ملف PDF.',
                icon: 'fa-file-export',
                color: 'text-amber-600',
                bg: 'bg-amber-100',
                accept: 'application/pdf',
                multiple: false,
                hint: 'اختر ملف PDF واحد',
                btnText: 'استخراج الصفحة',
                options: [
                    { type: 'number', id: 'pageNum', label: 'رقم الصفحة المراد استخراجها', default: 1, min: 1 }
                ],
                handler: runSplitPdf
            },
            {
                id: 'compressImg',
                title: 'ضغط الصور',
                desc: 'تقليل حجم الصورة (للصور نوع JPG/WEBP).',
                icon: 'fa-compress-arrows-alt',
                color: 'text-emerald-600',
                bg: 'bg-emerald-100',
                accept: 'image/jpeg, image/webp',
                multiple: false,
                hint: 'اختر صورة لضغطها',
                btnText: 'ضغط الصورة',
                options: [
                    { type: 'range', id: 'quality', label: 'جودة الصورة (أقل = حجم أصغر)', min: 10, max: 100, default: 60 }
                ],
                handler: runCompressImage
            },
            {
                id: 'convertImg',
                title: 'تحويل صيغة صورة',
                desc: 'تحويل بين JPG, PNG, WEBP.',
                icon: 'fa-exchange-alt',
                color: 'text-cyan-600',
                bg: 'bg-cyan-100',
                accept: 'image/*',
                multiple: false,
                hint: 'اختر صورة للتحويل',
                btnText: 'تحويل الصيغة',
                options: [
                    { type: 'select', id: 'format', label: 'الصيغة المطلوبة', choices: [
                        {val: 'image/jpeg', text: 'JPG'}, 
                        {val: 'image/png', text: 'PNG'}, 
                        {val: 'image/webp', text: 'WEBP'}
                    ]}
                ],
                handler: runConvertImage
            },
            {
                id: 'mergeTxt',
                title: 'دمج النصوص',
                desc: 'دمج محتوى عدة ملفات نصية (TXT).',
                icon: 'fa-file-lines',
                color: 'text-slate-600',
                bg: 'bg-slate-100',
                accept: 'text/plain',
                multiple: true,
                hint: 'اختر ملفات TXT',
                btnText: 'دمج النصوص',
                handler: runMergeText
            }
        ];

        // --- 2. STATE & DOM ELEMENTS ---
        let currentTool = null;
        let selectedFiles = [];
        let finalBlobUrl = null;
        let finalFilename = '';

        const DOM = {
            viewHome: document.getElementById('view-home'),
            viewTool: document.getElementById('view-tool'),
            btnBack: document.getElementById('btn-back'),
            appTitle: document.getElementById('app-title'),
            toolsGrid: document.getElementById('tools-grid'),
            fileInput: document.getElementById('file-input'),
            dropZone: document.getElementById('drop-zone'),
            actionArea: document.getElementById('action-area'),
            filesList: document.getElementById('files-list'),
            toolOptions: document.getElementById('tool-options'),
            btnAction: document.getElementById('btn-action'),
            btnDownload: document.getElementById('btn-download'),
            progressCont: document.getElementById('progress-container'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-percent')
        };

        // --- 3. INITIALIZATION & UI ROUTING ---
        function init() {
            renderHome();
            DOM.btnBack.addEventListener('click', goHome);
            DOM.fileInput.addEventListener('change', handleFileSelection);
            DOM.btnAction.addEventListener('click', executeTool);
            DOM.btnDownload.addEventListener('click', downloadResult);
        }

        function renderHome() {
            DOM.toolsGrid.innerHTML = '';
            toolsConfig.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col items-center text-center cursor-pointer';
                card.onclick = () => openTool(tool);
                card.innerHTML = `
                    <div class="w-14 h-14 rounded-full ${tool.bg} ${tool.color} flex items-center justify-center text-2xl mb-3">
                        <i class="fas ${tool.icon}"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 mb-1">${tool.title}</h3>
                    <p class="text-xs text-gray-500 leading-relaxed">${tool.desc}</p>
                `;
                DOM.toolsGrid.appendChild(card);
            });
        }

        function openTool(tool) {
            currentTool = tool;
            selectedFiles = [];
            resetUI();

            // Populate tool meta
            DOM.appTitle.textContent = tool.title;
            document.getElementById('tool-name').textContent = tool.title;
            document.getElementById('tool-desc').textContent = tool.desc;
            
            const iconBox = document.getElementById('tool-icon-box');
            iconBox.className = `w-16 h-16 mx-auto rounded-2xl flex items-center justify-center text-3xl mb-3 shadow-inner ${tool.bg} ${tool.color}`;
            document.getElementById('tool-icon').className = `fas ${tool.icon}`;
            
            document.getElementById('upload-hint').textContent = tool.hint;
            document.getElementById('btn-action-text').textContent = tool.btnText;
            
            DOM.fileInput.accept = tool.accept;
            DOM.fileInput.multiple = tool.multiple;

            renderOptions(tool.options);

            // Toggle Views
            DOM.viewHome.classList.add('hidden');
            DOM.viewTool.classList.remove('hidden');
            DOM.btnBack.classList.remove('hidden');
        }

        function goHome() {
            DOM.viewTool.classList.add('hidden');
            DOM.viewHome.classList.remove('hidden');
            DOM.btnBack.classList.add('hidden');
            DOM.appTitle.textContent = 'أدوات أوفلاين';
            currentTool = null;
            resetUI();
        }

        function resetUI() {
            DOM.fileInput.value = '';
            DOM.actionArea.classList.add('hidden');
            DOM.btnDownload.classList.add('hidden');
            DOM.progressCont.classList.add('hidden');
            DOM.dropZone.classList.remove('hidden');
            if(finalBlobUrl) { URL.revokeObjectURL(finalBlobUrl); finalBlobUrl = null; }
        }

        // --- 4. FILE HANDLING & OPTIONS ---
        function handleFileSelection(e) {
            const files = Array.from(e.target.files);
            if(!files.length) return;

            if(!currentTool.multiple && files.length > 1) {
                showToast('هذه الأداة تقبل ملفاً واحداً فقط');
                selectedFiles = [files[0]];
            } else {
                selectedFiles = files;
            }

            // Hide dropzone, show action area
            DOM.dropZone.classList.add('hidden');
            DOM.actionArea.classList.remove('hidden');
            
            // Render file list
            DOM.filesList.innerHTML = '';
            selectedFiles.forEach(file => {
                const sizeStr = (file.size / 1024 / 1024).toFixed(2) + ' MB';
                DOM.filesList.innerHTML += `
                    <div class="bg-white p-3 rounded-lg flex items-center gap-3 border border-gray-100 shadow-sm">
                        <div class="w-10 h-10 rounded bg-brand-50 text-brand-500 flex items-center justify-center shrink-0">
                            <i class="fas fa-file"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-bold text-gray-700 truncate">${file.name}</p>
                            <p class="text-xs text-gray-400">${sizeStr}</p>
                        </div>
                    </div>
                `;
            });
        }

        function renderOptions(options) {
            DOM.toolOptions.innerHTML = '';
            if(!options || options.length === 0) {
                DOM.toolOptions.classList.add('hidden');
                return;
            }
            DOM.toolOptions.classList.remove('hidden');
            
            options.forEach(opt => {
                let html = `<div class="mb-2"><label class="block text-sm font-bold text-gray-700 mb-1">${opt.label}</label>`;
                
                if(opt.type === 'number') {
                    html += `<input type="number" id="opt_${opt.id}" class="w-full border border-gray-300 rounded-lg p-2 text-center" value="${opt.default}" min="${opt.min}">`;
                } 
                else if(opt.type === 'range') {
                    html += `<div class="flex items-center gap-2">
                        <input type="range" id="opt_${opt.id}" class="w-full" min="${opt.min}" max="${opt.max}" value="${opt.default}" oninput="document.getElementById('val_${opt.id}').textContent = this.value">
                        <span id="val_${opt.id}" class="text-sm font-bold w-8 text-center">${opt.default}</span>
                    </div>`;
                }
                else if(opt.type === 'select') {
                    html += `<select id="opt_${opt.id}" class="w-full border border-gray-300 rounded-lg p-2 bg-white">`;
                    opt.choices.forEach(c => { html += `<option value="${c.val}">${c.text}</option>`; });
                    html += `</select>`;
                }
                html += `</div>`;
                DOM.toolOptions.innerHTML += html;
            });
        }

        function getOptionValue(id) {
            const el = document.getElementById(`opt_${id}`);
            return el ? el.value : null;
        }

        // --- 5. CORE EXECUTION LOGIC ---
        async function executeTool() {
            if(!selectedFiles.length) return;
            
            // UI setup for processing
            DOM.btnAction.disabled = true;
            DOM.btnAction.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري العمل...';
            DOM.progressCont.classList.remove('hidden');
            DOM.btnDownload.classList.add('hidden');
            updateProgress(5);

            try {
                // Call the specific tool handler
                await currentTool.handler();
                
                updateProgress(100);
                showToast('تمت العملية بنجاح! 🚀');
                DOM.btnDownload.classList.remove('hidden');
                DOM.btnAction.classList.add('hidden'); // Hide action, show download
            } catch (error) {
                console.error(error);
                showToast('حدث خطأ: ' + error.message);
            } finally {
                DOM.btnAction.disabled = false;
                DOM.btnAction.innerHTML = `<i class="fas fa-magic"></i> <span id="btn-action-text">${currentTool.btnText}</span>`;
            }
        }

        function updateProgress(percent) {
            DOM.progressBar.style.width = `${percent}%`;
            DOM.progressText.textContent = `${percent}%`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
            }, 3000);
        }

        function setFinalResult(blob, filename) {
            if(finalBlobUrl) URL.revokeObjectURL(finalBlobUrl);
            finalBlobUrl = URL.createObjectURL(blob);
            finalFilename = filename;
        }

        function downloadResult() {
            if(!finalBlobUrl) return;
            const a = document.createElement('a');
            a.href = finalBlobUrl;
            a.download = finalFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Reset for another task
            setTimeout(() => { goHome(); }, 500);
        }

        // --- 6. TOOL HANDLERS (The Client-Side Magic) ---

        // 6.1 Images to PDF
        async function runImageToPdf() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();

            for (let i = 0; i < selectedFiles.length; i++) {
                updateProgress(10 + Math.floor((i / selectedFiles.length) * 80));
                const file = selectedFiles[i];
                const imgDataUrl = await readAsDataURL(file);
                const imgProps = await getImageDimensions(imgDataUrl);

                // Fit to A4
                const ratio = Math.min(pageWidth / imgProps.width, pageHeight / imgProps.height);
                const drawWidth = imgProps.width * ratio;
                const drawHeight = imgProps.height * ratio;
                const x = (pageWidth - drawWidth) / 2;
                const y = (pageHeight - drawHeight) / 2;

                if (i > 0) pdf.addPage();
                
                // Determine format
                const isPng = file.type === 'image/png';
                pdf.addImage(imgDataUrl, isPng ? 'PNG' : 'JPEG', x, y, drawWidth, drawHeight);
            }
            setFinalResult(pdf.output('blob'), 'images_converted.pdf');
        }

        // 6.2 Merge PDFs
        async function runMergePdf() {
            if (selectedFiles.length < 2) throw new Error("اختر ملفين على الأقل");
            
            const { PDFDocument } = PDFLib;
            const mergedPdf = await PDFDocument.create();

            for (let i = 0; i < selectedFiles.length; i++) {
                updateProgress(10 + Math.floor((i / selectedFiles.length) * 80));
                const arrayBuffer = await readAsArrayBuffer(selectedFiles[i]);
                const pdfFile = await PDFDocument.load(arrayBuffer);
                const copiedPages = await mergedPdf.copyPages(pdfFile, pdfFile.getPageIndices());
                copiedPages.forEach((page) => mergedPdf.addPage(page));
            }

            const pdfBytes = await mergedPdf.save();
            setFinalResult(new Blob([pdfBytes], { type: 'application/pdf' }), 'merged_document.pdf');
        }

        // 6.3 Split/Extract PDF Page
        async function runSplitPdf() {
            const pageNum = parseInt(getOptionValue('pageNum'));
            if(isNaN(pageNum) || pageNum < 1) throw new Error("رقم صفحة غير صالح");

            const { PDFDocument } = PDFLib;
            updateProgress(30);
            
            const arrayBuffer = await readAsArrayBuffer(selectedFiles[0]);
            const originalPdf = await PDFDocument.load(arrayBuffer);
            
            const totalPages = originalPdf.getPageCount();
            if (pageNum > totalPages) throw new Error(`الملف يحتوي على ${totalPages} صفحة فقط`);

            updateProgress(60);
            const newPdf = await PDFDocument.create();
            // PDF-lib is 0-indexed
            const [copiedPage] = await newPdf.copyPages(originalPdf, [pageNum - 1]);
            newPdf.addPage(copiedPage);

            updateProgress(90);
            const pdfBytes = await newPdf.save();
            setFinalResult(new Blob([pdfBytes], { type: 'application/pdf' }), `page_${pageNum}_extracted.pdf`);
        }

        // 6.4 Compress Image
        async function runCompressImage() {
            const file = selectedFiles[0];
            const quality = parseInt(getOptionValue('quality')) / 100; // 0.1 to 1.0
            
            updateProgress(40);
            const dataUrl = await readAsDataURL(file);
            const img = new Image();
            
            await new Promise((res, rej) => {
                img.onload = res;
                img.onerror = rej;
                img.src = dataUrl;
            });

            updateProgress(60);
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            updateProgress(80);
            const blob = await new Promise(res => {
                // Ensure format supports quality parameter
                const mime = file.type === 'image/webp' ? 'image/webp' : 'image/jpeg';
                canvas.toBlob(res, mime, quality);
            });

            setFinalResult(blob, `compressed_${file.name}`);
        }

        // 6.5 Convert Image Format
        async function runConvertImage() {
            const file = selectedFiles[0];
            const targetFormat = getOptionValue('format'); // e.g., image/png
            
            updateProgress(50);
            const dataUrl = await readAsDataURL(file);
            const img = new Image();
            
            await new Promise((res, rej) => {
                img.onload = res;
                img.onerror = rej;
                img.src = dataUrl;
            });

            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            updateProgress(80);
            const blob = await new Promise(res => canvas.toBlob(res, targetFormat, 0.9));
            
            const ext = targetFormat.split('/')[1]; // jpeg, png, webp
            const newName = file.name.substring(0, file.name.lastIndexOf('.')) + '.' + ext;
            setFinalResult(blob, newName);
        }

        // 6.6 Merge Text Files
        async function runMergeText() {
            if (selectedFiles.length < 2) throw new Error("اختر ملفين نصيين على الأقل");
            
            let mergedContent = "";
            for (let i = 0; i < selectedFiles.length; i++) {
                updateProgress(10 + Math.floor((i / selectedFiles.length) * 80));
                const text = await readAsText(selectedFiles[i]);
                mergedContent += `\n\n--- محتوى الملف: ${selectedFiles[i].name} ---\n\n`;
                mergedContent += text;
            }

            const blob = new Blob([mergedContent], { type: 'text/plain;charset=utf-8' });
            setFinalResult(blob, 'merged_texts.txt');
        }

        // --- 7. HELPER FUNCTIONS ---
        function readAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function readAsArrayBuffer(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        function readAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function getImageDimensions(dataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve({ width: img.width, height: img.height });
                img.onerror = reject;
                img.src = dataUrl;
            });
        }

        // Start
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
